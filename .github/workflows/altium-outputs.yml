name: Altium Designer Automation

on:
  pull_request:
    branches: [ main ]
    paths:
      - 'hardware/**'

jobs:
  generate-outputs:
    name: Generate Manufacturing Files
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: [self-hosted, windows, altium]

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Run Altium Output Generation
        shell: powershell
        run: |
          $prjFile = (Get-ChildItem -Path "${{ github.workspace }}\hardware" -Filter "*.PrjPcb" -Recurse | Select-Object -First 1).FullName
          $scriptFile = "${{ github.workspace }}\hardware\automation\GenerateOutputs.pas"
          
          $prjFile = $prjFile.Replace("/", "\")
          $scriptFile = $scriptFile.Replace("/", "\")
          
          & "C:\Program Files\Altium\AD26\X2.EXE" "$prjFile" -R"ScriptingSystem:RunScript(ScriptName='$scriptFile', ProcName='RunOutJob')"

      - name: Upload Manufacturing Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: manufacturing-outputs
          path: hardware/**/ProjectOutputs/
          if-no-files-found: warn
