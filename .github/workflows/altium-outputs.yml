name: Altium Designer Automation

on:
  pull_request:
    branches: [ main ]
    paths:
      - 'hardware/**'

jobs:
  generate-outputs:
    name: Generate Manufacturing Files
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: [self-hosted, windows, altium]

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Run Altium Output Generation
        shell: powershell
        run: |
          try {
            $hwDir = Join-Path "${{ github.workspace }}" "hardware"
            $prjFile = (Get-ChildItem -Path $hwDir -Filter "*.PrjPcb" -Recurse -ErrorAction Stop | Select-Object -First 1).FullName
            $scriptPrj = Join-Path $hwDir "automation\Automation.PrjScr"
            $scriptFile = Join-Path $hwDir "automation\GenerateOutputs.pas"
            
            Write-Host "Project: $prjFile"
            Write-Host "Script Project: $scriptPrj"
            
            if (-not (Test-Path $prjFile)) { throw "Hardware project not found." }
            if (-not (Test-Path $scriptPrj)) { throw "Script project not found." }

            # Create the exact command line arguments
            $argList = @(
              "`"$prjFile`"",
              "-R`"ScriptingSystem:RunScript(ProjectName='$scriptPrj', ScriptName='$scriptFile', ProcName='RunOutJob')`""
            )

            Write-Host "Starting Altium Designer..."
            Start-Process -FilePath "C:\Program Files\Altium\AD26\X2.EXE" -ArgumentList $argList -Wait -ErrorAction Stop
            Write-Host "Altium Designer process exited."
          }
          catch {
            Write-Error $_.Exception.Message
            exit 1
          }

      - name: Display Automation Log
        if: always()
        shell: powershell
        run: |
          $logPath = Join-Path "${{ github.workspace }}" "automation_log.txt"
          if (Test-Path $logPath) {
            Get-Content $logPath
          } else {
            Write-Host "Log file not found. Altium may not have started the script."
          }

      - name: Debug - List Hardware Directory
        shell: powershell
        run: |
          Get-ChildItem -Path "${{ github.workspace }}\hardware" -Recurse | Select-Object FullName

      - name: Upload Manufacturing Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: manufacturing-outputs
          path: |
            hardware/**/Project Outputs for *
            hardware/**/ProjectOutputs
            hardware/**/Outputs
          if-no-files-found: warn
