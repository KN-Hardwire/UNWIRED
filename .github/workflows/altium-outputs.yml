name: Altium Designer Automation

on:
  pull_request:
    branches: [ main ]
    paths:
      - 'hardware/**'

jobs:
  generate-outputs:
    name: Generate Manufacturing Files
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: [self-hosted, windows, altium]

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Run Altium Output Generation
        shell: powershell
        run: |
          $prjFile = (Get-ChildItem -Path "${{ github.workspace }}\hardware" -Filter "*.PrjPcb" -Recurse | Select-Object -First 1).FullName
          $scriptFile = "${{ github.workspace }}\hardware\automation\GenerateOutputs.pas"
          
          $prjFile = $prjFile.Replace("/", "\")
          $scriptFile = $scriptFile.Replace("/", "\")
          
          # Force PowerShell to wait for Altium to finish before moving to the next step
          $argList = "`"$prjFile`"", "-R`"ScriptingSystem:RunScript(ScriptName='$scriptFile', ProcName='RunOutJob')`""
          Start-Process -FilePath "C:\Program Files\Altium\AD26\X2.EXE" -ArgumentList $argList -Wait

      - name: Display Automation Log
        if: always()
        shell: powershell
        run: |
          if (Test-Path "C:\altium_automation_log.txt") {
            Get-Content "C:\altium_automation_log.txt"
          } else {
            Write-Host "Log file not found. Script likely did not start."
          }

      - name: Debug - List Hardware Directory
        shell: powershell
        run: |
          Get-ChildItem -Path "${{ github.workspace }}\hardware" -Recurse | Select-Object FullName

      - name: Upload Manufacturing Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: manufacturing-outputs
          path: |
            hardware/**/Project Outputs for *
            hardware/**/ProjectOutputs
            hardware/**/Outputs
          if-no-files-found: warn
