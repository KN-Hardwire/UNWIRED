name: Altium Designer Automation

on:
  pull_request:
    branches: [ main ]
    paths:
      - 'hardware/**'

jobs:
  pre-cleanup:
    name: Initialize Workspace
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: [self-hosted, windows, altium]
    steps:
      - name: Terminate Altium Processes
        shell: cmd
        run: |
          taskkill /F /IM X2.EXE /T || exit 0
          taskkill /F /IM DXP.EXE /T || exit 0

  generate-outputs:
    name: Generate Manufacturing Files
    needs: pre-cleanup
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: [self-hosted, windows, altium]

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Run Altium Output Generation
        shell: cmd
        run: |
          "C:\Program Files\Altium\AD26\X2.EXE" -RScriptingSystem:RunScript(ProjectName="${{ github.workspace }}\hardware\automation\Automation.PrjScr", ScriptName="${{ github.workspace }}\hardware\automation\GenerateOutputs.pas", ProcName="GenerateOutputs.RunOutJob")


      - name: Upload Manufacturing Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: manufacturing-outputs
          path: hardware/**/ProjectOutputs/
          if-no-files-found: warn
