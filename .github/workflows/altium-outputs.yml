name: Altium Designer Automation

on:
  pull_request:
    branches: [ main ]
    paths:
      - 'hardware/**'

jobs:
  generate-outputs:
    name: Generate Manufacturing Files
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: [self-hosted, windows, altium]

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Run Altium Output Generation
        shell: powershell
        run: |
          $prjFile = (Get-ChildItem -Path "${{ github.workspace }}\hardware" -Filter "*.PrjPcb" -Recurse | Select-Object -First 1).FullName
          $scriptFile = "${{ github.workspace }}\hardware\automation\GenerateOutputs.pas"
          
          $prjFile = $prjFile.Replace("/", "\")
          $scriptFile = $scriptFile.Replace("/", "\")
          
          # Delete old log
          if (Test-Path "C:\altium_automation_log.txt") { Remove-Item "C:\altium_automation_log.txt" }

          # Create a 'dumb' batch file to bypass PowerShell quoting issues
          $batContent = "@echo off`n"
          $batContent += "`"C:\Program Files\Altium\AD26\X2.EXE`" `"$prjFile`" -R`"ScriptingSystem:RunScript(ScriptName='$scriptFile', ProcName='RunOutJob')`""
          $batContent | Out-File -FilePath "${{ github.workspace }}\run_altium.bat" -Encoding ascii
          
          Write-Host "Triggering Altium via Batch file..."
          Start-Process -FilePath "${{ github.workspace }}\run_altium.bat"

          # Wait for the log to signal FINISH or ERROR
          Write-Host "Waiting for Altium to finish (Timeout 5 mins)..."
          $timeout = 300 # seconds
          $elapsed = 0
          while ($true) {
              if (Test-Path "C:\altium_automation_log.txt") {
                  $log = Get-Content "C:\altium_automation_log.txt"
                  if ($log -match "FINISH|ERROR") {
                      Write-Host "Altium process finished signaled in log."
                      break
                  }
              }
              if ($elapsed -ge $timeout) {
                  Write-Host "Error: Timeout waiting for Altium."
                  break
              }
              Start-Sleep -Seconds 5
              $elapsed += 5
          }

      - name: Display Automation Log
        if: always()
        shell: powershell
        run: |
          if (Test-Path "C:\altium_automation_log.txt") {
            Get-Content "C:\altium_automation_log.txt"
          } else {
            Write-Host "Log file not found. Altium failed to start."
          }

      - name: Debug - List Hardware Directory
        shell: powershell
        run: |
          Get-ChildItem -Path "${{ github.workspace }}\hardware" -Recurse | Select-Object FullName

      - name: Upload Manufacturing Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: manufacturing-outputs
          path: |
            hardware/**/Project Outputs for *
            hardware/**/ProjectOutputs
            hardware/**/Outputs
          if-no-files-found: warn
