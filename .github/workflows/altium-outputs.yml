name: Altium Designer Automation

on:
  pull_request:
    branches: [ main ]
    paths:
      - 'hardware/**'

jobs:
  generate-outputs:
    name: Generate Manufacturing Files
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: [self-hosted, windows, altium]

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Run Altium Output Generation
        shell: powershell
        run: |
          try {
            $hwDir = Join-Path "${{ github.workspace }}" "hardware"
            $prjFile = (Get-ChildItem -Path $hwDir -Filter "*.PrjPcb" -Recurse -ErrorAction Stop | Select-Object -First 1).FullName
            $sourceScript = Join-Path $hwDir "automation\GenerateOutputs.pas"
            
            # Prepare Short-Path Environment
            $altDir = "C:\AltiumAutomation"
            if (!(Test-Path $altDir)) { New-Item -ItemType Directory -Path $altDir }
            
            $targetScript = Join-Path $altDir "GenerateOutputs.pas"
            $logPath = Join-Path $altDir "altium_automation_log.txt"
            
            # Copy script to short path to avoid Altium parser bugs
            Copy-Item -Path $sourceScript -Destination $targetScript -Force
            if (Test-Path $logPath) { Remove-Item $logPath }

            # Standardize project path for Altium
            $prjFile = $prjFile.Replace("/", "\")

            # Use the verified standalone invocation from the manual test
            $argList = @(
              "`"$prjFile`"",
              "-R`"ScriptingSystem:RunScript(ScriptName='$targetScript', ProcName='RunOutJob')`""
            )

            Write-Host "Triggering Altium Designer 26..."
            Start-Process -FilePath "C:\Program Files\Altium\AD26\X2.EXE" -ArgumentList $argList

            Write-Host "Polling for completion signal..."
            $timeout = 420 # 7 minutes
            $elapsed = 0
            while ($true) {
              if (Test-Path $logPath) {
                $logContent = Get-Content $logPath -ErrorAction SilentlyContinue
                if ($logContent -match "FINISH" -or $logContent -match "ERROR") {
                  Write-Host "Process finished."
                  break
                }
              }
              if ($elapsed -ge $timeout) { throw "Timeout waiting for Altium." }
              Start-Sleep -Seconds 10
              $elapsed += 10
            }
          }
          catch {
            Write-Error $_.Exception.Message
            exit 1
          }

      - name: Display Automation Log
        if: always()
        shell: powershell
        run: |
          $logPath = "C:\AltiumAutomation\altium_automation_log.txt"
          if (Test-Path $logPath) { Get-Content $logPath }

      - name: Debug - List Hardware Directory
        shell: powershell
        run: |
          Get-ChildItem -Path "${{ github.workspace }}\hardware" -Recurse | Select-Object FullName

      - name: Upload Manufacturing Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: manufacturing-outputs
          path: |
            hardware/**/Project Outputs for *
            hardware/**/ProjectOutputs
            hardware/**/Outputs
          if-no-files-found: warn
