name: Altium Designer Automation

on:
  pull_request:
    branches: [ main ]
    paths:
      - 'hardware/**'

jobs:
  generate-outputs:
    name: Generate Manufacturing Files
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: [self-hosted, windows, altium]

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Run Altium Output Generation
        shell: powershell
        run: |
          try {
            $hwDir = Join-Path "${{ github.workspace }}" "hardware"
            $prjFile = (Get-ChildItem -Path $hwDir -Filter "*.PrjPcb" -Recurse -ErrorAction Stop | Select-Object -First 1).FullName
            $scriptFile = Join-Path $hwDir "automation\GenerateOutputs.pas"
            
            $prjFile = $prjFile.Replace("/", "\")
            $scriptFile = $scriptFile.Replace("/", "\")
            
            $logPath = "C:\Users\Public\altium_log.txt"
            if (Test-Path $logPath) { Remove-Item $logPath }

            # Use the verified standalone invocation
            $argList = @(
              "`"$prjFile`"",
              "-R`"ScriptingSystem:RunScript(ScriptName='$scriptFile', ProcName='RunOutJob')`""
            )

            Write-Host "Starting Altium Designer..."
            # Launch without -Wait because X2.EXE exits immediately
            Start-Process -FilePath "C:\Program Files\Altium\AD26\X2.EXE" -ArgumentList $argList

            Write-Host "Polling for completion signal in log file..."
            $timeout = 300 # 5 minutes
            $elapsed = 0
            while ($true) {
              if (Test-Path $logPath) {
                $logContent = Get-Content $logPath
                if ($logContent -match "FINISH" -or $logContent -match "ERROR") {
                  Write-Host "Altium process signaled completion."
                  break
                }
              }
              if ($elapsed -ge $timeout) {
                Write-Host "Timeout reached waiting for Altium."
                break
              }
              Start-Sleep -Seconds 5
              $elapsed += 5
            }
          }
          catch {
            Write-Error $_.Exception.Message
            exit 1
          }

      - name: Display Automation Log
        if: always()
        shell: powershell
        run: |
          $logPath = "C:\Users\Public\altium_log.txt"
          if (Test-Path $logPath) {
            Get-Content $logPath
          } else {
            Write-Host "Log file not found. Altium failed to execute the script."
          }

      - name: Debug - List Hardware Directory
        shell: powershell
        run: |
          Get-ChildItem -Path "${{ github.workspace }}\hardware" -Recurse | Select-Object FullName

      - name: Upload Manufacturing Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: manufacturing-outputs
          path: |
            hardware/**/Project Outputs for *
            hardware/**/ProjectOutputs
            hardware/**/Outputs
          if-no-files-found: warn
